<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madlibs</title>
   <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">

   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Tiny5&display=swap" rel="stylesheet">

   <link rel="stylesheet" href="styles.css">
   <script src="script.js" defer></script>
</head>

<body class="madlibs-play-body">
    <header>MadLibs</header>
    <nav>
    </nav>

    <main class="madlibs-play">

 
        <section class="left">
            <img class="saturn" src="images/saturn.png" alt="Drawing of Saturn">
            <img class="purple" src="images/purple-planet.png" alt="drawing of a purple planet">
                <img class="purple-ship-play" src="images/ship.png" alt="Drawing of a spaceship">
            <img class="moon" src="images/moon.png" alt="Drawing of a moon">
            <img class="captain" src="images/captain.png" alt="Drawing of an astronaut cat">
            <img class="pink-planet" src="images/pink-planet.png" alt="Drawing of a pink planet">
        </section>

        <section class="right-enter">
  <section class="story">
    <!-- <img class="game-title" src="images/game-title-mad.png" alt="Logo of the game title"> 
    <h2>THE GREAT KITTY RESCUE</h2> -->

    <form id="madlibs">
      <div class="form-fields">

        <!-- LEFT COLUMN -->
        <div class="split-left">

          <div class="form-labels">
            <label for="adj">Write an adjective:</label>
            <input type="text" name="adj" id="adj" placeholder="ex: happy, sassy" required>
          </div>

          <div class="form-labels">
            <label for="noun1">Write a noun:</label>
            <input type="text" name="noun1" id="noun1" placeholder="ex: burger, pencil" required>
          </div>

          <div class="form-labels">
            <label for="planet1">Make a planet name:</label>
            <input type="text" name="planet1" id="planet1" placeholder="ex: Kitty Whiskers" required>
          </div>

          <div class="form-labels">
            <label for="adverb2">Write an adverb:</label>
            <input type="text" name="adverb2" id="adverb2" placeholder="ex: swiftly, quietly" required>
          </div>

          <div class="form-labels">
            <label for="planet2">Write the same planet name:</label>
            <input type="text" name="planet2" id="planet2" placeholder="ex: Kitty Whiskers" required>
          </div>
        </div>

        <!-- RIGHT COLUMN -->
        <div class="split-right">

          <div class="form-labels">
            <label for="noun2">Write a noun:</label>
            <input type="text" name="noun2" id="noun2" placeholder="ex: frog, donkey, alien" required>
          </div>

          <div class="form-labels">
            <label for="adverb3">Write an adverb:</label>
            <input type="text" name="adverb3" id="adverb3" placeholder="ex: quickly, cautiously" required>
          </div>

          <div class="form-labels">
            <label for="weapon">Write a weapon:</label>
            <input type="text" name="weapon" id="noun3" placeholder="ex: laser, hammer" required>
          </div>

          <div class="form-labels">
            <label for="planet3">Write the same planet name:</label>
            <input type="text" name="planet3" id="planet3" placeholder="ex: Kitty Whiskers" required>
          </div>

          <div class="form-labels">
            <label for="food">Write a type of food:</label>
            <input type="text" name="food" id="food" placeholder="ex: pizza, sushi" required>
          </div>

        </div>

      </div>

      <input type="submit" id="submit-button" name="send" value="SUBMIT">
    </form>
  </section>
</section>

    </main>
    <article id="results"></article>
</body>
</html>
