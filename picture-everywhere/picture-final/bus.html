<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Every Picture</title>
    <script src="bus.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="styles.css">
</head>
<body class="bus-body">
    <main class="bus-main">
    <!-- animation: scrapbook animation  -->
        <h1>Bus Adventure Activated!</h1>
        <img class="picture-title" src="images/bus-activated.png" alt="Bus title">
        <!-- main images -->

              <section class="bus-note">
            <div class="post-it">
                <h3>sweet treat, here i come!</h3>
            </div>
        </section>

        <!-- animation: size up when hovered, and shakes to reveal that my friend is on the bus with me and image stays -->
        <div class="hover-me">
            <img class="before" src="images/on-bus.png" alt="photo of me waiting for bus">
            <img class="after" src="images/bus-reveal.png" class="photo of Trixi in the bus with friend">
            <p class="bus-text">boarded and ready for the ride!</>
            <!-- <img src="images/bus-reveal.png" alt="photo of Trixi in the bus"> -->
        </div>
        
          <div class="sticker"></div>
          
        <section class="sticky-notes">
            <div class="tape"></div>
            <div class="polaroid">
                <img class="waiting" src="images/waiting-bus.png" alt="photo of me waiting for bus">
                <p>waiting for the bus :3</p>
            </div> 

            
        </section>

        <section class="photo">
            <div class="tape2"></div>
            <div class="polaroid2">
                <img class="me" src="images/myself.png" alt="image of myself">
                <p>bus is a little late...</p>
            </div>
        </section>
        <!-- decoration images -->
        <!-- animation: sway -->

        <div class="decorations-transport">
            <img class="top" src="images/green-gingham.png" alt="image of a green gingham pattern">
            <img class="bottom-bus" src="images/red-gingham.png" alt="image of a red gingham pattern">
       
        </div>

             <div class="stickers">
                        <img class="bus-star1" src="images/star-sticker_.png" alt="photo of buttons">
                        <img class="bus-star2" src="images/star-sticker_.png" alt="photo of buttons">
                        <img class="bus-star3" src="images/star-sticker_.png" alt="photo of buttons">
                        <img class="bus-star4" src="images/star-sticker_.png" alt="photo of buttons">
          
        </div>

        <nav class="bus-nav">
            <!-- <a href="picture.html"><img src="images/" alt="photo of home"></a> -->
            <a class="next" href="pick-a-spot.html"><img src="images/purple-arrow.png" alt="photo of forward arrow"></a>
        </nav>
    </main>
    
</body>
</html>
