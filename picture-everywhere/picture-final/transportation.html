<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Every Picture</title>

    
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="transportation.js" defer></script>
</head>
<body class="transportation-body">
    <main class="transportation-main">
    <!-- animation will have the text either size up or something with scrapbook -->
        <h1>Guess How I'm Going There</h1>
        <img class="picture-title" src="images/transportation-title.png" alt="Transportation title">

        <!-- main images -->
        <!-- animation: hover to see the specs and comments and image goes size up -->

        <div class="transportation-options">
            <div class="keys">
                <div class="keys-inner">
                <img class="keys-photo" src="images/keys.png" alt="photo of keys">
                <div class="specs1">
                    <p>hmmm..do i want to be there, faster? but gas is so expensive especially as a college student-</p>
                </div>
                </div>
            </div>
   
        
            <div class="bus">
                <div class="bus-inner">
                <img  class="bus-photo" src="images/ID.png" alt="photo of bus card">
                <div class="specs2">
                    <p>i could get a free ride on the bus, but it literally takes so long to wait for a ride...</p>
                </div>
            </div>
            </div>
        </div>
        
        <!-- decoration images -->
        <!-- animation: sway -->
        <div class="decorations-transport">
            <img class="top" src="images/green-gingham.png" alt="image of a green gingham pattern">
            <img class="bottom-transport" src="images/red-gingham.png" alt="image of a red gingham pattern">
            <img class="button1"src="images/" alt="photo of buttons">
            <img class="button2" src="" alt="photo of buttons">
            <img class="button3" src="" alt="photo of buttons">
        </div>


        <nav class="transport-nav"> 
            <!-- <a href="picture.html"><img src="images/" alt="photo of home"></a> -->
            <a class="next" href="bus.html"><img src="images/purple-arrow.png" alt="photo of forward arrow"></a>
        </nav>
    </main>
    
</body>
</html>
