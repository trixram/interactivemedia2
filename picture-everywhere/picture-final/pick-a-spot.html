<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Every Picture</title>
    <script src="pick.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

   <link rel="stylesheet" href="styles.css">
</head>
<body class="pick-body">
    <main class="pick-main">
        <!-- animtion: will size up or scrapbook animation -->
        <h1>Dear diary… I can’t decide</h1>
        <img class="picture-title-pick" src="images/dear_diary.png" alt="Spot Title">

        <!-- <h3>Hover over the options to see the specs!</h3> -->
        <!-- main images -->
        <!-- animation: size u  QAp and either on the side or somewhere on top, information -->

    <section class="spot-note">
            <div class="post-it">
                <h2>so many options...</h2>
            </div>
    </section>
        <div class="spot-options">

            <div class="place1">
                <div class="place1-inner">
                <img class="sharetea" src="images/share-teai.png" alt="photo of sharetea">
                <div class="spot-text">
        
                        <p>sharetea has so much varieties and the sweetness level is not that sweet, which is perfect for me! but, it's expensive...</p>
                </div>
                </div>
              </div>

              <div class="place2">
                <div class="place2-inner">
                    <img class="itea" src="images/itea.png" alt="photo of itea">
                <div class="spot-text2">
                
                    <p>love my OG spot and always will be my favorite! but i'm always sticking to my favorite...should i try something new?</p>
                 </div>
                 </div>
            </div>
        
        </div>
        
        <!-- decoration images -->
        <!-- animation: sway -->
       <div class="decorations-transport">
            <img class="top" src="images/green-gingham.png" alt="image of a green gingham pattern">
            <img class="bottom-pick" src="images/red-gingham.png" alt="image of a red gingham pattern">
        </div>

        
        <div class="stickers">
                        <img class="pick-star1" src="images/star-sticker_.png" alt="photo of buttons">
                        <img class="pick-star2" src="images/star-sticker_.png" alt="photo of buttons">
                        <img class="pick-star3" src="images/star-sticker_.png" alt="photo of buttons">
                        <img class="pick-star4" src="images/star-sticker_.png" alt="photo of buttons">
       <img class="dango1-transport" src="images/dango_sticker.png" alt="photo of buttons">
              <img class="dango2-transport" src="images/dango_sticker.png" alt="photo of buttons">
        </div>

        <nav class="pick-nav">
            <!-- <a href="picture.html"><img src="images/" alt="photo of home"></a> -->
            <a class="next" href="ending.html"><img src="images/purple-arrow.png" alt="photo of forward arrow"></a>
        </nav>

    </main>

    
</body>
</html>
