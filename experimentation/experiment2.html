<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 1</title>
</head>
<body>
    <h1>Look in the console to see the results</h1>
    <h2>Experiment 1</h2>

    <script>

        
        /* In this program, your job is to guess which number is the right number */

        // Sequence
        var myText = prompt(`Hello there! Let's play! Guess the number I'm thinking between 1-10 :)`) 

 /*        three loops to declare a specific number */

    // Selection
        if(myText == 9){  
        
    // Loop
        for(var i=0; i=9; i++) {
            console.log(`Congrats! You won the game!`);
        }
        }

        else {
            console.log(`Sorry! You lost, try again!`)
        };
       

    </script>
    
</body>
</html>
