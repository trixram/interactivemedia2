<body>
    <h1>Look in the console to see the results</h1>
    <script>
        var userInput = prompt("Hmm, what's the day today", "Write: Today is (day)")

        let day;

        switch(new Date().getDay()) {
            case 0:
            day="Sunday";
            break;

            case 1:
            day="Monday";
             break;

            case 2:
            day="Tuesday";
             break; 

            case 3:
            day="Wednesday";
             break;

            case 4:
            day="Thursday";
             break;

            day="Friday";
             break;

             case 6:
            day="Saturday";
             break;
        }

    </script>
